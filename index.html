<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
    <h2 class="text-xl font-bold text-white mb-2">Get in Touch</h2>
    <p class="text-xs text-slate-400 mb-6">Your message will be sent securely in the background.</p>

    <!-- Netlify form setup with a spam honeypot named "bot-field" -->
    <form name="contact-form" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="space-y-4">
      <input type="hidden" name="form-name" value="contact-form" />
      
      <!-- Hidden honeypot field. If a bot fills this, Netlify drops the submission. -->
      <p class="hidden">
        <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
      </p>

      <!-- User Input Fields -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">Full Name</label>
        <input type="text" name="name" required placeholder="John Doe" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-200 text-sm focus:outline-none focus:border-indigo-500" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">Email Address</label>
        <input type="email" name="email" required placeholder="john@example.com" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-200 text-sm focus:outline-none focus:border-indigo-500" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">Message</label>
        <textarea name="message" required rows="4" placeholder="Write your message..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-200 text-sm focus:outline-none focus:border-indigo-500"></textarea>
      </div>

      <!-- Hidden Security Telemetry Fields (Populated by JavaScript below) -->
      <input type="hidden" name="sec_user_agent" id="sec_user_agent" />
      <input type="hidden" name="sec_screen" id="sec_screen" />
      <input type="hidden" name="sec_timezone" id="sec_timezone" />
      <input type="hidden" name="sec_language" id="sec_language" />

      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors">
        Send Secure Message
      </button>
    </form>
  </div>

  <script>
    // Safely capture device/browser telemetry upon page load
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sec_user_agent').value = navigator.userAgent;
      document.getElementById('sec_screen').value = `${window.screen.width}x${window.screen.height} (${window.screen.colorDepth}-bit)`;
      document.getElementById('sec_timezone').value = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';
      document.getElementById('sec_language').value = navigator.language || 'en-US';
    });
  </script>
</body>
</html>
